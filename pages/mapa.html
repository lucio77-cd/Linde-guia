<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa — Linde Guia</title>
  <meta name="description" content="Mapa de Treze Tílias com todos os lugares cadastrados no Linde Guia." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --borde: #8B1A1A;
      --borde-escuro: #6B1212;
      --dourado: #C8943A;
      --creme: #F5F0E8;
      --creme-medio: #EDE6D6;
      --creme-escuro: #DDD4C0;
      --verde: #2D4A1E;
      --tinta: #1C1714;
      --tinta-suave: #4A3F38;
      --branco: #FDFAF6;

      --cat-gastronomia: #8B4A1A;
      --cat-historico:   #1A2D8B;
      --cat-natureza:    #1A6B2D;
      --cat-compras:     #6B1A8B;
      --cat-lazer:       #8B6B1A;
      --cat-cultura:     #8B3A1A;

      --fonte-display: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Inter', system-ui, sans-serif;
      --transicao: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--fonte-corpo);
      background: var(--creme);
      color: var(--tinta);
      -webkit-font-smoothing: antialiased;
      height: 100svh;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    .topo {
      position: relative; z-index: 500;
      background: var(--branco);
      border-bottom: 1px solid var(--creme-escuro);
      padding: 0 clamp(1.25rem, 5vw, 3rem);
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .topo__marca { display: flex; align-items: center; gap: 0.625rem; }
    .topo__flor { width: 32px; height: 32px; flex-shrink: 0; }
    .topo__nome { font-family: var(--fonte-display); font-weight: 700; font-size: 1.0625rem; color: var(--tinta); }
    .topo__nav { display: flex; align-items: center; gap: 0.25rem; }
    .topo__nav a {
      font-size: 0.875rem; font-weight: 500; color: var(--tinta-suave);
      padding: 0.5rem 0.875rem; border-radius: 8px;
      transition: background var(--transicao), color var(--transicao);
    }
    .topo__nav a:hover { background: var(--creme-medio); color: var(--tinta); }
    .topo__nav a.destaque { background: var(--borde); color: var(--branco); }
    .topo__nav a.destaque:hover { background: var(--borde-escuro); }
    @media (max-width: 720px) { .topo__nav a:not(.destaque) { display: none; } }

    /* ============================================================
       MAPA — filtro CSS pra dar tom tirolês ao mapa padrão OSM, sem
       precisar de conta paga de estilo de mapa customizado. sepia +
       hue-rotate + saturate puxa a paleta pro creme/dourado/verde que o
       resto do app já usa; brightness/contrast compensam pra não ficar
       lavado nem escuro demais.
    ============================================================ */
    #mapa {
      height: calc(100svh - 64px);
      width: 100%;
    }
    #mapa .leaflet-tile-pane {
      filter: sepia(0.35) saturate(1.5) hue-rotate(-8deg) brightness(0.96) contrast(1.05);
    }

    .marcador-poi {
      width: 30px; height: 30px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--branco);
      box-shadow: 0 2px 6px rgba(28,23,20,0.35);
    }
    .marcador-poi__emoji {
      transform: rotate(45deg);
      font-size: 0.9375rem;
      line-height: 1;
    }

    .popup-poi { font-family: var(--fonte-corpo); text-align: center; min-width: 140px; }
    .popup-poi__nome { font-family: var(--fonte-display); font-weight: 700; font-size: 0.9375rem; margin-bottom: 0.375rem; color: var(--tinta); }
    .popup-poi__categoria { font-size: 0.75rem; color: var(--tinta-suave); text-transform: capitalize; margin-bottom: 0.625rem; }
    .popup-poi__link {
      display: inline-block; font-size: 0.8125rem; font-weight: 600;
      color: var(--branco); background: var(--borde);
      padding: 0.4rem 0.875rem; border-radius: 100px;
    }

    .legenda-mapa {
      position: absolute; z-index: 400; bottom: 1rem; left: 1rem;
      background: var(--branco); border: 1.5px solid var(--creme-escuro);
      border-radius: 14px; padding: 0.75rem 1rem;
      box-shadow: 0 4px 16px rgba(28,23,20,0.12);
      font-size: 0.75rem;
      max-width: 200px;
    }
    .legenda-mapa__item { display: flex; align-items: center; gap: 0.5rem; padding: 0.2rem 0; }
    .legenda-mapa__ponto { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .estado-carregando-mapa {
      position: absolute; inset: 64px 0 0 0; z-index: 450;
      background: var(--creme);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9375rem; color: var(--tinta-suave);
    }
    .estado-carregando-mapa[hidden] { display: none; }

    :focus-visible { outline: 3px solid var(--borde); outline-offset: 3px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
  </style>
</head>
<body>

  <header class="topo">
    <a href="../index.html" class="topo__marca">
      <svg class="topo__flor" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <ellipse cx="24" cy="10" rx="4" ry="8" fill="#C8943A" opacity="0.9"/>
        <ellipse cx="24" cy="10" rx="4" ry="8" fill="#C8943A" opacity="0.9" transform="rotate(90 24 24)"/>
        <circle cx="24" cy="24" r="6" fill="#8B1A1A"/>
        <circle cx="24" cy="24" r="3.5" fill="#C8943A"/>
      </svg>
      <span class="topo__nome">Linde Guia</span>
    </a>
    <nav class="topo__nav" aria-label="Navegação principal">
      <a href="explorar.html">Explorar</a>
      <a href="mapa.html">Mapa</a>
      <a href="eventos.html">Eventos</a>
      <a href="perfil.html">Perfil</a>
      <a href="roteiro.html" class="destaque">Criar roteiro</a>
    </nav>
  </header>

  <div id="mapa"></div>

  <div id="estado-carregando-mapa" class="estado-carregando-mapa">Carregando o mapa da cidade…</div>

  <div class="legenda-mapa" id="legenda-mapa" hidden>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-gastronomia)"></span>Gastronomia</div>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-historico)"></span>História</div>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-natureza)"></span>Natureza</div>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-compras)"></span>Compras</div>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-lazer)"></span>Lazer</div>
    <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-cultura)"></span>Cultura</div>
  </div>

  <script type="module" src="../js/core/firebase-config.js"></script>
  <script type="module" src="../js/pages/mapa.js"></script>
  <script type="module" src="../js/core/registrar-acesso.js"></script>
</body>
</html>
