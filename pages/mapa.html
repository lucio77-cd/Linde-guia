<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa — Linde Guia</title>
  <meta name="description" content="Mapa de Treze Tílias com todos os lugares cadastrados no Linde Guia." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/responsivo.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --borde: #8B1A1A;
      --borde-escuro: #6B1212;
      --dourado: #C8943A;
      --creme: #F5F0E8;
      --creme-medio: #EDE6D6;
      --creme-escuro: #DDD4C0;
      --verde: #2D4A1E;
      --tinta: #1C1714;
      --tinta-suave: #4A3F38;
      --branco: #FDFAF6;

      --cat-gastronomia: #8B4A1A;
      --cat-historico:   #1A2D8B;
      --cat-natureza:    #1A6B2D;
      --cat-compras:     #6B1A8B;
      --cat-lazer:       #8B6B1A;
      --cat-cultura:     #8B3A1A;

      --fonte-display: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Inter', system-ui, sans-serif;
      --transicao: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--fonte-corpo);
      background: var(--creme);
      color: var(--tinta);
      -webkit-font-smoothing: antialiased;
      height: 100svh;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ============================================================
       MOBILE-FIRST: tudo abaixo já parte do layout de celular (foco do
       projeto). As regras dentro de @media (min-width: 768px) no fim do
       arquivo são só AJUSTES pra aproveitar tela grande de notebook —
       nunca uma versão totalmente separada de CSS.
    ============================================================ */

    .topo {
      position: relative; z-index: 500;
      background: var(--branco);
      border-bottom: 1px solid var(--creme-escuro);
      padding: 0 1rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .topo__marca { display: flex; align-items: center; gap: 0.5rem; }
    .topo__flor { width: 28px; height: 28px; flex-shrink: 0; }
    .topo__nome { font-family: var(--fonte-display); font-weight: 700; font-size: 0.9375rem; color: var(--tinta); }
    .topo__nav { display: flex; align-items: center; gap: 0.125rem; }
    .topo__nav a {
      font-size: 0.8125rem; font-weight: 500; color: var(--tinta-suave);
      padding: 0.4rem 0.625rem; border-radius: 8px;
      transition: background var(--transicao), color var(--transicao);
    }
    .topo__nav a:hover { background: var(--creme-medio); color: var(--tinta); }
    .topo__nav a.destaque { background: var(--borde); color: var(--branco); }
    .topo__nav a.destaque:hover { background: var(--borde-escuro); }
    /* No celular, só o essencial no menu — o resto de sobra some, igual
       ao padrão já usado nas outras páginas do app. */
    .topo__nav a:not(.destaque):not(.topo__nav--mapa) { display: none; }

    .banner-patrocinado { border-bottom: 1px solid var(--creme-escuro); background: var(--branco); }
    .banner-patrocinado[hidden] { display: none; }
    .banner-patrocinado a { display: block; position: relative; max-width: 100%; }
    .banner-patrocinado img { width: 100%; aspect-ratio: 3 / 1; object-fit: cover; display: block; }
    .banner-patrocinado__selo {
      position: absolute; bottom: 0.375rem; right: 0.5rem;
      font-size: 0.625rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      background: rgba(28,23,20,0.6); color: #fff; padding: 0.15rem 0.5rem; border-radius: 100px;
    }

    /* ============================================================
       MAPA — filtro CSS pra dar tom tirolês ao mapa padrão OSM, sem
       precisar de conta paga de estilo de mapa customizado. sepia +
       hue-rotate + saturate puxa a paleta pro creme/dourado/verde que o
       resto do app já usa.
    ============================================================ */
    #mapa-container { position: relative; height: calc(100svh - 56px); width: 100%; }
    #mapa { height: 100%; width: 100%; }
    #mapa .leaflet-tile-pane {
      filter: sepia(0.35) saturate(1.5) hue-rotate(-8deg) brightness(0.96) contrast(1.05);
    }

    /* Alvo de toque maior nos controles de zoom — importante no celular,
       o tamanho padrão do Leaflet é pequeno demais pro dedo. */
    #mapa .leaflet-control-zoom a { width: 40px !important; height: 40px !important; line-height: 40px !important; font-size: 1.125rem !important; }
    #mapa .leaflet-control-zoom { margin-right: 0.75rem !important; margin-top: 0.75rem !important; }

    .marcador-poi {
      width: 30px; height: 30px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--branco);
      box-shadow: 0 2px 6px rgba(28,23,20,0.35);
    }
    .marcador-poi__emoji { transform: rotate(45deg); font-size: 0.9375rem; line-height: 1; }

    .popup-poi { font-family: var(--fonte-corpo); text-align: center; min-width: 140px; }
    .popup-poi__nome { font-family: var(--fonte-display); font-weight: 700; font-size: 0.9375rem; margin-bottom: 0.375rem; color: var(--tinta); }
    .popup-poi__categoria { font-size: 0.75rem; color: var(--tinta-suave); text-transform: capitalize; margin-bottom: 0.625rem; }
    .popup-poi__link {
      display: inline-block; font-size: 0.8125rem; font-weight: 600;
      color: var(--branco); background: var(--borde);
      padding: 0.5rem 1rem; border-radius: 100px; /* alvo de toque confortável */
    }

    /* Legenda: no celular vira uma fita horizontal rolável colada embaixo
       (não esconde o mapa, não sobrepõe o dedo tentando arrastar). No
       notebook (ver @media abaixo) volta a ser um cartão de canto. */
    .legenda-mapa {
      position: absolute; z-index: 400; left: 0; right: 0; bottom: 0;
      background: var(--branco); border-top: 1.5px solid var(--creme-escuro);
      padding: 0.625rem 0.75rem;
      display: flex; gap: 0.625rem; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .legenda-mapa[hidden] { display: none; }
    .legenda-mapa__item {
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.75rem; white-space: nowrap; flex-shrink: 0;
    }
    .legenda-mapa__ponto { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .estado-carregando-mapa {
      position: absolute; inset: 0; z-index: 450;
      background: var(--creme);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9375rem; color: var(--tinta-suave); text-align: center; padding: 1rem;
    }
    .estado-carregando-mapa[hidden] { display: none; }

    .botao-whatsapp-flutuante {
      position: fixed; z-index: 300;
      bottom: 4.5rem; right: 1rem; /* mais alto no celular, pra não colidir com a legenda embaixo */
      width: 52px; height: 52px; border-radius: 50%;
      background: #25D366; color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
    }
    .botao-whatsapp-flutuante:hover { transform: scale(1.06); }
    .botao-whatsapp-flutuante[hidden] { display: none; }

    :focus-visible { outline: 3px solid var(--borde); outline-offset: 3px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }

    /* ============================================================
       AJUSTES PRA NOTEBOOK — só cresce o que já existe, não duplica CSS
    ============================================================ */
    @media (min-width: 768px) {
      .topo { padding: 0 clamp(1.5rem, 4vw, 3rem); height: 64px; }
      .topo__flor { width: 32px; height: 32px; }
      .topo__nome { font-size: 1.0625rem; }
      .topo__nav a { font-size: 0.875rem; padding: 0.5rem 0.875rem; }
      .topo__nav a:not(.destaque) { display: inline-block; } /* menu completo volta a aparecer */

      #mapa-container { height: calc(100svh - 64px); }

      /* Legenda volta a ser cartão de canto, não sobrepõe o mapa inteiro */
      .legenda-mapa {
        left: auto; right: 1rem; bottom: 1rem; top: auto;
        border-top: none; border: 1.5px solid var(--creme-escuro);
        border-radius: 14px; box-shadow: 0 4px 16px rgba(28,23,20,0.12);
        flex-direction: column; overflow-x: visible; max-width: 200px;
      }
      .legenda-mapa__item { padding: 0.15rem 0; }

      .botao-whatsapp-flutuante { bottom: 1.5rem; right: 1.5rem; width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

    <a href="../index.html" class="topo__marca">

        <circle cx="24" cy="24" r="6" fill="#8B1A1A"/>

      <span class="topo__nome">Linde Guia</span>

    <nav class="topo__nav" aria-label="Navegação principal">
      <a href="explorar.html">Explorar</a>
      <a href="mapa.html" class="topo__nav--mapa">Mapa</a>
      <a href="eventos.html">Eventos</a>
      <a href="perfil.html">Perfil</a>
      <a href="roteiro.html" class="destaque">Criar roteiro</a>
    </nav>
  </header>
  <div id="banner-patrocinado" class="banner-patrocinado" hidden>
    <a id="banner-patrocinado__link" href="#" target="_blank" rel="noopener sponsored">
      <img id="banner-patrocinado__imagem" alt="" />
      <span class="banner-patrocinado__selo">Publicidade</span>

  <div id="mapa-container">
    <div id="mapa"></div>

    <div id="estado-carregando-mapa" class="estado-carregando-mapa">Carregando o mapa da cidade…</div>

      <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-gastronomia)"></span>Gastronomia</div>

      <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-natureza)"></span>Natureza</div>
      <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-compras)"></span>Compras</div>
      <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-lazer)"></span>Lazer</div>
      <div class="legenda-mapa__item"><span class="legenda-mapa__ponto" style="background:var(--cat-cultura)"></span>Cultura</div>
